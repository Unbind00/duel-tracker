<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Duel Tracker" />
  <meta name="theme-color" content="#000000" />
  <title>Duel Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.png" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --p1: #00c9b1;
      --p2: #9b5de5;
      --bg: #0a0a0a;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Share Tech Mono', monospace;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      width: 100%;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      gap: 10px;
    }

    .panel.p1 { background: linear-gradient(to top, rgba(0,201,177,0.10), transparent); }
    .panel.p2 {
      background: linear-gradient(to bottom, rgba(155,93,229,0.10), transparent);
      transform: rotate(180deg);
    }

    /* ── DIVIDER ── */
    .divider {
      position: relative;
      height: 52px;
      background: #0f0f0f;
      border-top: 1px solid rgba(255,255,255,0.07);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 10;
    }

    .divider-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      width: 44px;
      height: 36px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      line-height: 1;
    }
    .divider-btn:active { background: rgba(255,255,255,0.12); transform: scale(0.90); }

    .install-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      height: 36px;
      padding: 0 12px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .install-btn:active { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); }

    /* ── RESULT TOAST ── */
    .result-toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.85);
      background: #1c1c1c;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 22px;
      padding: 32px 48px;
      text-align: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      min-width: 200px;
    }
    .result-toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: all;
    }
    .result-emoji { font-size: 56px; line-height: 1; margin-bottom: 12px; }
    .result-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 3px;
    }
    .result-type {
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.3);
      margin-top: 8px;
    }

    /* ── PLAYER LABEL ── */
    .player-label {
      font-size: 11px;
      letter-spacing: 4px;
      opacity: 0.5;
      text-transform: uppercase;
    }
    .p1 .player-label { color: var(--p1); }
    .p2 .player-label { color: var(--p2); }

    /* ── LIFE DISPLAY ── */
    .life-btn {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 18px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease;
      width: 240px;
    }
    .life-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.07); }

    .life-number {
      font-family: 'Rajdhani', sans-serif;
      font-size: 72px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      transition: color 0.3s;
      letter-spacing: -1px;
    }
    .life-number.dead { color: #555; }

    .life-hint {
      font-size: 9px;
      letter-spacing: 3px;
      opacity: 0.35;
      color: #fff;
    }

    .p1 .life-btn { border-color: rgba(0,201,177,0.25); }
    .p2 .life-btn { border-color: rgba(155,93,229,0.25); }

    /* ── DEFEATED ── */
    .defeated {
      font-size: 10px;
      letter-spacing: 3px;
      color: #ff4444;
      opacity: 0.7;
      display: none;
    }
    .defeated.visible { display: block; }

    /* ── RESET ── */
    .reset-wrap {
      position: absolute;
      bottom: env(safe-area-inset-bottom, 12px);
      left: 50%;
      transform: translateX(-50%);
    }
    .reset-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      color: rgba(255,255,255,0.3);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      padding: 6px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .reset-btn:active { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6); }

    /* ── OVERLAY / SHEET ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .sheet {
      background: #141414;
      border-radius: 24px 24px 0 0;
      width: 100%;
      padding: 20px 24px calc(env(safe-area-inset-bottom, 16px) + 20px);
      transform: translateY(20px);
      transition: transform 0.25s ease;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .overlay.open .sheet { transform: translateY(0); }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .sheet-title-label {
      text-align: center;
      font-size: 10px;
      letter-spacing: 4px;
      opacity: 0.5;
      margin-bottom: 2px;
    }
    .sheet-title {
      text-align: center;
      font-family: 'Rajdhani', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    /* ── MODE TOGGLE ── */
    .mode-toggle {
      display: flex;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 18px;
      gap: 4px;
    }
    .mode-btn {
      flex: 1;
      padding: 8px 2px;
      border-radius: 9px;
      border: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.18s ease;
      background: transparent;
      color: rgba(255,255,255,0.35);
    }
    .mode-btn.active-sub  { background: #ff5566; color: #000; }
    .mode-btn.active-add  { background: #33dd66; color: #000; }
    .mode-btn.active-half { background: #f0a500; color: #000; }

    /* ── INPUT ROW ── */
    .input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 10px 18px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .input-row.hidden { display: none; }

    .input-sign {
      font-family: 'Rajdhani', sans-serif;
      font-size: 32px;
      font-weight: 700;
      width: 28px;
      text-align: center;
      flex-shrink: 0;
      transition: color 0.18s;
    }
    .sign-sub  { color: #ff5566; }
    .sign-add  { color: #33dd66; }
    .sign-half { color: #f0a500; font-size: 22px; }

    #amount-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Rajdhani', sans-serif;
      font-size: 44px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      caret-color: rgba(255,255,255,0.5);
      -webkit-appearance: none;
    }

    .preview {
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 18px;
      height: 18px;
      letter-spacing: 1px;
    }

    .confirm-btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      letter-spacing: 3px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
      color: #000;
    }
    .confirm-btn:disabled {
      background: rgba(255,255,255,0.1) !important;
      color: rgba(255,255,255,0.2);
      cursor: default;
    }

    /* ── FLASH ANIMATIONS ── */
    @keyframes pulse-teal {
      0%   { text-shadow: 0 0 0px rgba(0,201,177,0); }
      50%  { text-shadow: 0 0 24px rgba(0,201,177,0.9); }
      100% { text-shadow: 0 0 0px rgba(0,201,177,0); }
    }
    @keyframes pulse-purple {
      0%   { text-shadow: 0 0 0px rgba(155,93,229,0); }
      50%  { text-shadow: 0 0 24px rgba(155,93,229,0.9); }
      100% { text-shadow: 0 0 0px rgba(155,93,229,0); }
    }
    .flash-p1 { animation: pulse-teal   0.5s ease; }
    .flash-p2 { animation: pulse-purple 0.5s ease; }
  </style>
</head>
<body>

<div id="app">

  <!-- Player 2 (top, rotated) -->
  <div class="panel p2">
    <span class="player-label">PLAYER 2</span>
    <button class="life-btn" onclick="openEditor(2)">
      <span class="life-number" id="lp2">8000</span>
      <span class="life-hint">LP · TAP TO EDIT</span>
    </button>
    <span class="defeated" id="dead2">💀 DEFEATED</span>
  </div>

  <!-- Divider -->
  <div class="divider">
    <button class="divider-btn" onclick="rollDice()">🎲</button>
    <button class="divider-btn" onclick="flipCoin()">🪙</button>
    <a class="install-btn" href="https://github.com/Unbind00/duel-tracker/blob/main/README.md" target="_blank" rel="noopener">📲 INSTALL</a>
  </div>

  <!-- Player 1 (bottom) -->
  <div class="panel p1">
    <span class="player-label">PLAYER 1</span>
    <button class="life-btn" onclick="openEditor(1)">
      <span class="life-number" id="lp1">8000</span>
      <span class="life-hint">LP · TAP TO EDIT</span>
    </button>
    <span class="defeated" id="dead1">💀 DEFEATED</span>

    <div class="reset-wrap">
      <button class="reset-btn" onclick="resetGame()">↺ RESET</button>
    </div>
  </div>

</div>

<!-- Dice / Coin Result Toast -->
<div class="result-toast" id="result-toast" onclick="hideToast()">
  <div class="result-emoji" id="result-emoji">🎲</div>
  <div class="result-label" id="result-label">6</div>
  <div class="result-type" id="result-type">DICE ROLL · TAP TO DISMISS</div>
</div>

<!-- Edit Sheet -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title-label" id="sheet-player-label">PLAYER 1</div>
    <div class="sheet-title">EDIT LIFE POINTS</div>

    <div class="mode-toggle">
      <button class="mode-btn active-sub"  id="btn-sub"  onclick="setMode('sub')">− SUB</button>
      <button class="mode-btn"             id="btn-add"  onclick="setMode('add')">+ ADD</button>
      <button class="mode-btn"             id="btn-half" onclick="setMode('half')">½ HALF</button>
    </div>

    <div class="input-row" id="input-row">
      <span class="input-sign sign-sub" id="input-sign">−</span>
      <input id="amount-input" type="number" inputmode="numeric" min="0" placeholder="0"
             oninput="updatePreview()" />
    </div>

    <div class="preview" id="preview"></div>

    <button class="confirm-btn" id="confirm-btn" onclick="confirmEdit()" disabled>CONFIRM</button>
  </div>
</div>

<script>
  let lp = { 1: 8000, 2: 8000 };
  let activePlayer = 1;
  let mode = 'sub';
  const colors = { 1: '#00c9b1', 2: '#9b5de5' };

  function openEditor(player) {
    activePlayer = player;
    document.getElementById('sheet-player-label').textContent = `PLAYER ${player}`;
    document.getElementById('amount-input').value = '';
    document.getElementById('preview').textContent = '';
    document.getElementById('confirm-btn').disabled = true;
    setMode('sub');
    const c = colors[player];
    document.getElementById('confirm-btn').style.background = c;
    document.getElementById('input-row').style.borderColor = c + '55';
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('amount-input').focus(), 300);
  }

  function closeEditor() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('amount-input').blur();
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('overlay')) closeEditor();
  }

  function setMode(m) {
    mode = m;
    document.getElementById('btn-sub').className  = 'mode-btn' + (m === 'sub'  ? ' active-sub'  : '');
    document.getElementById('btn-add').className  = 'mode-btn' + (m === 'add'  ? ' active-add'  : '');
    document.getElementById('btn-half').className = 'mode-btn' + (m === 'half' ? ' active-half' : '');

    const sign     = document.getElementById('input-sign');
    const inputRow = document.getElementById('input-row');
    const confirmBtn = document.getElementById('confirm-btn');

    if (m === 'half') {
      inputRow.classList.add('hidden');
      sign.textContent = '½';
      sign.className = 'input-sign sign-half';
      const result = Math.floor(lp[activePlayer] / 2);
      document.getElementById('preview').textContent = `${lp[activePlayer].toLocaleString()}  →  ${result.toLocaleString()}`;
      confirmBtn.disabled = false;
      confirmBtn.style.background = '#f0a500';
    } else {
      inputRow.classList.remove('hidden');
      sign.textContent = m === 'sub' ? '−' : '+';
      sign.className = 'input-sign ' + (m === 'sub' ? 'sign-sub' : 'sign-add');
      confirmBtn.style.background = colors[activePlayer];
      updatePreview();
    }
  }

  function updatePreview() {
    if (mode === 'half') return;
    const raw = document.getElementById('amount-input').value;
    const val = parseInt(raw, 10);
    const confirmBtn = document.getElementById('confirm-btn');
    if (!raw || isNaN(val) || val < 0) {
      document.getElementById('preview').textContent = '';
      confirmBtn.disabled = true;
      return;
    }
    const current = lp[activePlayer];
    const result = mode === 'add' ? current + val : current - val;
    document.getElementById('preview').textContent = `${current.toLocaleString()}  →  ${result.toLocaleString()}`;
    confirmBtn.disabled = false;
  }

  function confirmEdit() {
    if (mode === 'half') {
      lp[activePlayer] = Math.floor(lp[activePlayer] / 2);
    } else {
      const val = parseInt(document.getElementById('amount-input').value, 10);
      if (isNaN(val)) return;
      lp[activePlayer] = mode === 'add' ? lp[activePlayer] + val : lp[activePlayer] - val;
    }
    renderLP(activePlayer);
    closeEditor();
  }

  function renderLP(player) {
    const el     = document.getElementById(`lp${player}`);
    const deadEl = document.getElementById(`dead${player}`);
    el.textContent = lp[player].toLocaleString();
    if (lp[player] <= 0) {
      el.classList.add('dead');
      deadEl.classList.add('visible');
    } else {
      el.classList.remove('dead');
      deadEl.classList.remove('visible');
    }
    el.classList.remove('flash-p1', 'flash-p2');
    void el.offsetWidth;
    el.classList.add(`flash-p${player}`);
  }

  function resetGame() {
    lp[1] = 8000; lp[2] = 8000;
    renderLP(1); renderLP(2);
  }

  // ── DICE ──
  const DICE_FACES = ['⚀','⚁','⚂','⚃','⚄','⚅'];
  function rollDice() {
    const n = Math.floor(Math.random() * 6) + 1;
    showToast(DICE_FACES[n - 1], `ROLLED A ${n}`, 'DICE ROLL');
  }

  // ── COIN ──
  function flipCoin() {
    const heads = Math.random() < 0.5;
    showToast(heads ? '🌕' : '🌑', heads ? 'HEADS' : 'TAILS', 'COIN FLIP');
  }

  // ── TOAST ──
  let toastTimer = null;
  function showToast(emoji, label, type) {
    document.getElementById('result-emoji').textContent = emoji;
    document.getElementById('result-label').textContent = label;
    document.getElementById('result-type').textContent  = type + ' · TAP TO DISMISS';
    document.getElementById('result-toast').classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(hideToast, 3500);
  }
  function hideToast() {
    document.getElementById('result-toast').classList.remove('show');
    clearTimeout(toastTimer);
  }

  document.getElementById('amount-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !document.getElementById('confirm-btn').disabled) confirmEdit();
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
